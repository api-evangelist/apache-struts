apis:
  - aid: apache-struts:apache-struts-rest-plugin
    name: Apache Struts REST Plugin
    description: >-
      The Struts REST Plugin provides a convention-based REST API framework for building
      RESTful services. It maps HTTP methods to action methods (GET→index/show, POST→create,
      PUT→update, DELETE→destroy) and supports multiple content type negotiation for JSON,
      XML, and HTML responses via content type headers and URL extensions.
    humanURL: https://struts.apache.org/plugins/rest/
    tags:
      - REST
      - Java
      - MVC
      - JSON
      - XML
    properties:
      - type: Documentation
        url: https://struts.apache.org/plugins/rest/
      - type: SDK
        url: https://search.maven.org/search?q=org.apache.struts2
        title: Maven Java SDK
common:
  - type: GitHubRepository
