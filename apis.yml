aid: apache-struts
name: Apache Struts
description: >-
  Apache Struts is a free, open-source, MVC framework for creating elegant, modern Java web
  applications. It provides a clean separation between the model, view, and controller layers
  with a powerful convention-over-configuration approach, interceptor-based AOP support,
  type-safe configuration, and built-in REST plugin. Apache Struts is maintained by the Apache
  Software Foundation and is widely used in enterprise Java web development.
type: Index
position: Consumer
access: 3rd-Party
